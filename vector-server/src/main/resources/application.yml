server:
  # HTTP 服务端口，可通过 SERVER_PORT 环境变量覆盖，默认 18080。
  port: ${SERVER_PORT:18080}

spring:
  application:
    # Spring Boot 应用名称，用于日志、监控和服务识别。
    name: rongqi-vector-server

rongqi:
  vector:
    milvus:
      # Milvus 服务地址，可填写本地、Docker 或远程 Milvus 的 HTTP/gRPC 地址。
      uri: ${RONGQI_VECTOR_MILVUS_URI:http://127.0.0.1:19530}
      # Milvus 鉴权 token；未开启鉴权时可以留空。
      token: ${RONGQI_VECTOR_MILVUS_TOKEN:}
      # 默认 Milvus database；请求或注解未指定 database 时使用该值。
      database: ${RONGQI_VECTOR_MILVUS_DATABASE:default}
    embedding:
      # 默认 EmbeddingProvider 名称；生产环境建议配置为 http 或自定义 Provider 名称。
      default-provider: ${RONGQI_VECTOR_EMBEDDING_DEFAULT_PROVIDER:noop}
      # 批量写入时每次调用 EmbeddingProvider 的文本数量，默认 32。
      batch-size: ${RONGQI_VECTOR_EMBEDDING_BATCH_SIZE:32}
    http-embedding:
      # 是否启用内置 HTTP EmbeddingProvider。
      enabled: ${RONGQI_VECTOR_HTTP_EMBEDDING_ENABLED:false}
      # 内置 HTTP EmbeddingProvider 注册名称，需要和 default-provider 或 schema 中的 provider 对应。
      name: ${RONGQI_VECTOR_HTTP_EMBEDDING_NAME:http}
      # Embedding 服务地址；OpenAI 兼容 base url 会自动补 /embeddings。
      url: ${RONGQI_VECTOR_HTTP_EMBEDDING_URL:}
      # Embedding 服务密钥，建议通过环境变量传入，不要写死在配置文件。
      api-key: ${RONGQI_VECTOR_HTTP_EMBEDDING_API_KEY:}
      # Embedding 模型名称，例如 text-embedding-v4。
      model: ${RONGQI_VECTOR_HTTP_EMBEDDING_MODEL:}
      # 模型输出向量维度，必须和 Collection 向量字段 dimension 一致。
      dimension: ${RONGQI_VECTOR_HTTP_EMBEDDING_DIMENSION:1024}
      # HTTP Embedding 请求超时时间，单位毫秒。
      timeout-millis: ${RONGQI_VECTOR_HTTP_EMBEDDING_TIMEOUT_MILLIS:30000}
      # 请求遇到 429、5xx 或网络异常时的最大重试次数。
      max-retries: ${RONGQI_VECTOR_HTTP_EMBEDDING_MAX_RETRIES:2}
      # 每次 HTTP Embedding 重试前等待的时间，单位毫秒。
      retry-interval-millis: ${RONGQI_VECTOR_HTTP_EMBEDDING_RETRY_INTERVAL_MILLIS:500}
    rerank:
      # 是否启用内置 RerankProvider 注册；关闭时仍可通过自定义 Bean 注册 provider。
      enabled: ${RONGQI_VECTOR_RERANK_ENABLED:false}
      # 未在请求 RankOptions 中指定 rerankProvider 时使用的默认 provider 名称。
      default-provider: ${RONGQI_VECTOR_RERANK_DEFAULT_PROVIDER:dashscope}
      # HTTP Rerank 请求超时时间，单位毫秒。
      timeout-millis: ${RONGQI_VECTOR_RERANK_TIMEOUT_MILLIS:30000}
      # HTTP Rerank 请求遇到 429、5xx 或网络异常时的最大重试次数。
      max-retries: ${RONGQI_VECTOR_RERANK_MAX_RETRIES:2}
      # 每次 HTTP Rerank 重试前等待的时间，单位毫秒。
      retry-interval-millis: ${RONGQI_VECTOR_RERANK_RETRY_INTERVAL_MILLIS:500}
      dashscope:
        # 是否启用阿里云 DashScope RerankProvider。
        enabled: ${RONGQI_VECTOR_RERANK_DASHSCOPE_ENABLED:false}
        # DashScope RerankProvider 注册名称，请求里可通过 rerankProvider 使用该名称。
        name: ${RONGQI_VECTOR_RERANK_DASHSCOPE_NAME:dashscope}
        # DashScope rerank 接口地址，通常保持默认即可。
        url: ${RONGQI_VECTOR_RERANK_DASHSCOPE_URL:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
        # DashScope API Key，建议通过环境变量传入，不要写死在配置文件。
        api-key: ${RONGQI_VECTOR_RERANK_DASHSCOPE_API_KEY:}
        # DashScope rerank 模型名称。
        model: ${RONGQI_VECTOR_RERANK_DASHSCOPE_MODEL:gte-rerank}
      bge:
        # 是否启用 BGE RerankProvider，适合对接本地或自托管 bge-reranker 服务。
        enabled: ${RONGQI_VECTOR_RERANK_BGE_ENABLED:false}
        # BGE RerankProvider 注册名称，请求里可通过 rerankProvider 使用该名称。
        name: ${RONGQI_VECTOR_RERANK_BGE_NAME:bge}
        # BGE rerank 服务地址，要求服务接受 query 和 documents 参数。
        url: ${RONGQI_VECTOR_RERANK_BGE_URL:http://127.0.0.1:8000/rerank}
        # BGE 服务密钥；本地无鉴权服务可以留空。
        api-key: ${RONGQI_VECTOR_RERANK_BGE_API_KEY:}
        # BGE rerank 模型名称。
        model: ${RONGQI_VECTOR_RERANK_BGE_MODEL:bge-reranker-large}
    schema:
      # HTTP Collection schema 存储方式，支持 file 或 jdbc。
      type: ${RONGQI_VECTOR_SCHEMA_TYPE:file}
      # file 模式下 schema 文件保存目录。
      storage-dir: ${RONGQI_VECTOR_SCHEMA_STORAGE_DIR:data/rongqi-vector/collections}
      jdbc:
        # jdbc 模式下保存 schema 的表名，只能包含字母、数字、下划线。
        table-name: ${RONGQI_VECTOR_SCHEMA_JDBC_TABLE_NAME:vector_collection_schema}
        # jdbc 模式启动时是否自动创建 schema 表。
        initialize-schema: ${RONGQI_VECTOR_SCHEMA_JDBC_INITIALIZE_SCHEMA:true}
